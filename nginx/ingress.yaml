apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: myapp.local                 # the hostname we'll use in the browser
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-service       # your existing NodePort service
                port:
                  number: 80
